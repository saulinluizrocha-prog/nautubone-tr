<!DOCTYPE html>
<html lang="tr-TR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teşekkürler - Nautubone</title>
  <link rel="shortcut icon" href="img/logo.png" type="image/png">
  <link rel="stylesheet" href="css/style-1.css">
  <link rel="stylesheet" href="css/css2.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #e0f7f4 0%, #f5fffе 50%, #d4f5ef 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Manrope', sans-serif;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(57, 195, 178, 0.18);
      padding: 4rem 3rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
    }

    .check-circle {
      width: 90px;
      height: 90px;
      background: #39c3b2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .check-circle svg {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: #fff;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .logo-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2.4rem;
    }

    .logo-area img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    .logo-area h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #39c3b2;
      font-family: 'Kulim Park', serif;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 1.2rem;
      font-family: 'Kulim Park', serif;
    }

    .subtitle {
      font-size: 1.7rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 2.8rem;
    }

    .info-box {
      background: #f0fdfb;
      border: 1.5px solid #39c3b2;
      border-radius: 12px;
      padding: 1.8rem;
      margin-bottom: 2.8rem;
    }

    .info-box p {
      font-size: 1.5rem;
      color: #2a7a6f;
      line-height: 1.7;
    }

    .info-box strong {
      color: #39c3b2;
    }

    .back-btn {
      display: inline-block;
      padding: 1.4rem 3.2rem;
      background: #39c3b2;
      color: #fff;
      border-radius: 40px;
      font-size: 1.7rem;
      font-weight: 700;
      text-decoration: none;
      transition: background 0.3s, transform 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .back-btn:hover {
      background: #249285;
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .card { padding: 2.5rem 1.5rem; }
      h1 { font-size: 2rem; }
      .subtitle { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-area">
      <img src="img/logo.png" alt="Nautubone Logo">
      <h2>Nautubone</h2>
    </div>

    <div class="check-circle">
      <svg viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1>Siparişiniz Alındı! 🎉</h1>
    <p class="subtitle">
      Nautubone siparişiniz başarıyla kaydedildi.<br>
      En kısa sürede sizinle iletişime geçeceğiz.
    </p>

    <div class="info-box">
      <p>
        📦 Siparişiniz <strong>kargo ile</strong> teslim edilecektir.<br>
        💳 Ödeme <strong>kapıda nakit</strong> olarak yapılacaktır.<br>
        📞 Operatörümüz en kısa sürede sizi arayacaktır.
      </p>
    </div>

    <a href="index.html" class="back-btn">← Ana Sayfaya Dön</a>
  </div>
</body>
</html>
